<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <!-- @axiom: technology.md#clean-minimal-design -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 300;
      color: #b83f45;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* @axiom: technology.md#responsive */
    .add-form {
      display: flex;
      border-bottom: 1px solid #eee;
    }

    .add-form input {
      flex: 1;
      padding: 16px;
      font-size: 1rem;
      border: none;
      outline: none;
      background: transparent;
    }

    .add-form button {
      padding: 16px 20px;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #b83f45;
      cursor: pointer;
    }

    .add-form button:hover { background: #fafafa; }
    /* /@axiom: technology.md#responsive */

    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    .task-item:hover { background: #fafafa; }

    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #b83f45;
    }

    .task-item .task-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
    }

    /* @axiom: axioms.md#toggle-task */
    .task-item.done .task-text {
      text-decoration: line-through;
      color: #aaa;
    }
    /* /@axiom: axioms.md#toggle-task */

    .task-item .delete-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #ccc;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .task-item .delete-btn:hover { color: #b83f45; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #888;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      background: none;
      border: 1px solid transparent;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #888;
    }

    .filters button:hover { border-color: #ddd; }

    /* @axiom: axioms.md#filter-tasks */
    .filters button.active {
      border-color: #b83f45;
      color: #b83f45;
    }
    /* /@axiom: axioms.md#filter-tasks */

    .clear-completed {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #888;
    }

    .clear-completed:hover { text-decoration: underline; }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
    }
  </style>
  <!-- /@axiom: technology.md#clean-minimal-design -->
</head>
<body>
  <div class="app">
    <h1>todos</h1>
    <div class="card">
      <!-- @axiom: axioms.md#add-task -->
      <form class="add-form" id="add-form">
        <input type="text" id="task-input" placeholder="What needs to be done?" autofocus>
        <button type="submit">+</button>
      </form>
      <!-- /@axiom: axioms.md#add-task -->

      <ul class="task-list" id="task-list"></ul>

      <div class="footer" id="footer" style="display:none;">
        <!-- @axiom: axioms.md#task-counter -->
        <span id="counter"></span>
        <!-- /@axiom: axioms.md#task-counter -->

        <!-- @axiom: axioms.md#filter-tasks -->
        <div class="filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="active">Active</button>
          <button data-filter="completed">Completed</button>
        </div>
        <!-- /@axiom: axioms.md#filter-tasks -->

        <!-- @axiom: axioms.md#clear-completed -->
        <button class="clear-completed" id="clear-completed" style="display:none;">Clear completed</button>
        <!-- /@axiom: axioms.md#clear-completed -->
      </div>
    </div>
  </div>

  <script>
    // @axiom: axioms.md#task-structure
    function createTask(text) {
      return { id: crypto.randomUUID(), text: text.trim(), done: false };
    }
    // /@axiom: axioms.md#task-structure

    // @axiom: axioms.md#persistence
    const STORAGE_KEY = 'todo-tasks';

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }
    // /@axiom: axioms.md#persistence

    let tasks = loadTasks();
    let currentFilter = 'all';

    const form = document.getElementById('add-form');
    const input = document.getElementById('task-input');
    const list = document.getElementById('task-list');
    const footer = document.getElementById('footer');
    const counter = document.getElementById('counter');
    const clearBtn = document.getElementById('clear-completed');
    const filterBtns = document.querySelectorAll('[data-filter]');

    function render() {
      // @axiom: axioms.md#filter-tasks
      const filtered = tasks.filter(t => {
        if (currentFilter === 'active') return !t.done;
        if (currentFilter === 'completed') return t.done;
        return true;
      });
      // /@axiom: axioms.md#filter-tasks

      list.innerHTML = '';

      if (tasks.length === 0) {
        list.innerHTML = '<li class="empty-state">No tasks yet</li>';
      } else {
        filtered.forEach(task => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.done ? ' done' : '');

          // @axiom: axioms.md#toggle-task
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.done;
          checkbox.addEventListener('change', () => toggleTask(task.id));
          // /@axiom: axioms.md#toggle-task

          const span = document.createElement('span');
          span.className = 'task-text';
          span.textContent = task.text;

          // @axiom: axioms.md#delete-task
          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '\u00d7';
          del.addEventListener('click', () => deleteTask(task.id));
          // /@axiom: axioms.md#delete-task

          li.append(checkbox, span, del);
          list.appendChild(li);
        });
      }

      // @axiom: axioms.md#task-counter
      const activeCount = tasks.filter(t => !t.done).length;
      counter.textContent = `${activeCount} item${activeCount !== 1 ? 's' : ''} left`;
      // /@axiom: axioms.md#task-counter

      // @axiom: axioms.md#clear-completed
      const hasCompleted = tasks.some(t => t.done);
      clearBtn.style.display = hasCompleted ? '' : 'none';
      // /@axiom: axioms.md#clear-completed

      footer.style.display = tasks.length > 0 ? '' : 'none';

      filterBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === currentFilter);
      });
    }

    // @axiom: axioms.md#add-task
    form.addEventListener('submit', e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      tasks.push(createTask(text));
      saveTasks(tasks);
      input.value = '';
      input.focus();
      render();
    });
    // /@axiom: axioms.md#add-task

    // @axiom: axioms.md#toggle-task
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        saveTasks(tasks);
        render();
      }
    }
    // /@axiom: axioms.md#toggle-task

    // @axiom: axioms.md#delete-task
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks(tasks);
      render();
    }
    // /@axiom: axioms.md#delete-task

    // @axiom: axioms.md#filter-tasks
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        render();
      });
    });
    // /@axiom: axioms.md#filter-tasks

    // @axiom: axioms.md#clear-completed
    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      saveTasks(tasks);
      render();
    });
    // /@axiom: axioms.md#clear-completed

    render();
  </script>
</body>
</html>
