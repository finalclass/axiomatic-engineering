<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App — Tests</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #1a1a2e; color: #eee; }
    h1 { font-size: 1.2rem; margin-bottom: 16px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .result { margin: 4px 0; }
    .summary { margin-top: 16px; padding-top: 12px; border-top: 1px solid #333; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Todo App Tests</h1>
  <div id="output"></div>
  <script>
    const output = document.getElementById('output');
    let passed = 0, failed = 0;

    function assert(condition, name) {
      const el = document.createElement('div');
      el.className = 'result';
      if (condition) {
        passed++;
        el.innerHTML = `<span class="pass">✓</span> ${name}`;
      } else {
        failed++;
        el.innerHTML = `<span class="fail">✗</span> ${name}`;
      }
      output.appendChild(el);
    }

    function summary() {
      const el = document.createElement('div');
      el.className = 'summary ' + (failed === 0 ? 'pass' : 'fail');
      el.textContent = `${passed} passed, ${failed} failed`;
      output.appendChild(el);
    }

    // Mock localStorage
    const store = {};
    const mockStorage = {
      getItem: k => store[k] ?? null,
      setItem: (k, v) => { store[k] = String(v); },
      removeItem: k => { delete store[k]; },
      clear: () => { for (const k in store) delete store[k]; }
    };

    // ---- Task structure tests ----

    (function testTaskStructure() {
      // Inline createTask for isolated testing
      function createTask(text) {
        return { id: crypto.randomUUID(), text: text.trim(), done: false };
      }

      const task = createTask('Buy milk');
      assert(typeof task.id === 'string' && task.id.length > 0, 'Task has a non-empty string id');
      assert(task.text === 'Buy milk', 'Task text is set correctly');
      assert(task.done === false, 'Task done defaults to false');

      const t1 = createTask('A');
      const t2 = createTask('B');
      assert(t1.id !== t2.id, 'Each task gets a unique id');

      const trimmed = createTask('  hello  ');
      assert(trimmed.text === 'hello', 'Task text is trimmed');
    })();

    // ---- Persistence tests ----

    (function testPersistence() {
      const STORAGE_KEY = 'todo-tasks';

      function loadTasks(storage) {
        try {
          const raw = storage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed;
        } catch { return []; }
      }

      function saveTasks(tasks, storage) {
        storage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }

      // Empty/missing
      mockStorage.clear();
      assert(loadTasks(mockStorage).length === 0, 'Load returns empty array when key missing');

      // Invalid JSON
      mockStorage.setItem(STORAGE_KEY, 'not json');
      assert(loadTasks(mockStorage).length === 0, 'Load returns empty array for invalid JSON');

      // Non-array JSON
      mockStorage.setItem(STORAGE_KEY, '{"a":1}');
      assert(loadTasks(mockStorage).length === 0, 'Load returns empty array for non-array JSON');

      // Valid data roundtrip
      mockStorage.clear();
      const tasks = [{ id: '1', text: 'Test', done: false }];
      saveTasks(tasks, mockStorage);
      const loaded = loadTasks(mockStorage);
      assert(loaded.length === 1 && loaded[0].text === 'Test', 'Save and load roundtrip works');
    })();

    // ---- Add task tests ----

    (function testAddTask() {
      function createTask(text) {
        return { id: crypto.randomUUID(), text: text.trim(), done: false };
      }

      let tasks = [];

      function addTask(text) {
        const trimmed = text.trim();
        if (!trimmed) return false;
        tasks.push(createTask(trimmed));
        return true;
      }

      assert(addTask('') === false, 'Adding empty string is rejected');
      assert(addTask('   ') === false, 'Adding whitespace-only is rejected');
      assert(tasks.length === 0, 'No tasks added for invalid input');

      assert(addTask('Valid task') === true, 'Valid task is accepted');
      assert(tasks.length === 1, 'Task is added to list');
      assert(tasks[0].text === 'Valid task', 'Task text is correct');
    })();

    // ---- Toggle task tests ----

    (function testToggleTask() {
      const tasks = [
        { id: 'a', text: 'Task A', done: false },
        { id: 'b', text: 'Task B', done: true },
      ];

      function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) task.done = !task.done;
      }

      toggleTask('a');
      assert(tasks[0].done === true, 'Toggle false → true');

      toggleTask('a');
      assert(tasks[0].done === false, 'Toggle true → false');

      toggleTask('b');
      assert(tasks[1].done === false, 'Toggle second task');

      const before = JSON.stringify(tasks);
      toggleTask('nonexistent');
      assert(JSON.stringify(tasks) === before, 'Toggle nonexistent id does nothing');
    })();

    // ---- Delete task tests ----

    (function testDeleteTask() {
      let tasks = [
        { id: 'x', text: 'X', done: false },
        { id: 'y', text: 'Y', done: false },
        { id: 'z', text: 'Z', done: true },
      ];

      function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
      }

      deleteTask('y');
      assert(tasks.length === 2, 'Task is removed');
      assert(!tasks.find(t => t.id === 'y'), 'Correct task is removed');

      deleteTask('nonexistent');
      assert(tasks.length === 2, 'Deleting nonexistent id does nothing');
    })();

    summary();
  </script>
</body>
</html>
