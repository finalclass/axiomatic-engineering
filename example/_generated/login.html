<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — KlinikaOnline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-form h1 { margin-bottom: 1.5rem; font-size: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #333; }
    .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
    .error-message { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .submit-btn { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .forgot-link { display: block; text-align: center; margin-top: 1rem; color: #2563eb; text-decoration: none; font-size: 0.875rem; }
  </style>
</head>
<body>
  <form class="login-form" id="loginForm" novalidate>
    <h1>Zaloguj się</h1>
    <div class="error-message" id="errorMessage">Nieprawidłowy email lub hasło</div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="password">Hasło</label>
      <input type="password" id="password" name="password" required minlength="8">
    </div>
    <button type="submit" class="submit-btn">Zaloguj się</button>
    <a href="/reset-password" class="forgot-link">Nie pamiętam hasła</a>
  </form>
  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password || password.length < 8) {
        errorMessage.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          errorMessage.style.display = 'block';
          return;
        }

        const data = await response.json();
        window.location.href = data.redirect;
      } catch {
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
<!-- /@axiom: login-client/login.md -->
